; FiberQuest HMI — Guition ESP32-S3-4848S040
; 480×480 RGB panel, GT911 capacitive touch, 16MB flash, 8MB OPI PSRAM
;
; Build:  pio run -e fiberquest-hmi
; Flash:  pio run -e fiberquest-hmi -t upload
; Serial: pio device monitor

[platformio]
default_envs = fiberquest-hmi

[env:fiberquest-hmi]
platform  = platformio/espressif32@6.5.0
board     = guition4848s040
framework = arduino

board_build.flash_size         = 16MB
board_build.partitions         = huge_app.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; LVGL config
    -DLVGL_CONF_INCLUDE_SIMPLE
    -DLV_CONF_PATH="${PROJECT_DIR}/src/lv_conf.h"
    ; Board pin map
    -DBOARD_GUITION_4848S040

upload_speed  = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    ; Display (RGB parallel + ST7701S init)
    moononournation/GFX Library for Arduino @ ^1.4.9
    ; Touch (GT911 I2C)
    https://github.com/CoderEthan/GT911_Arduino.git
    ; LVGL
    lvgl/lvgl @ ^8.3.11
    ; WiFi + JSON (for Fiber RPC calls)
    bblanchon/ArduinoJson @ ^7.1.0
    ; HTTP client
    arduino-libraries/ArduinoHttpClient @ ^0.6.1
    ; WebSocket client (agent event stream)
    links-a2/WebSockets @ ^2.4.1
