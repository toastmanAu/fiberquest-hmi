; FiberQuest HMI — Guition ESP32-S3-4848S040
; Uses wyltek-embedded-builder (WEB) for board support

[env:fiberquest-hmi]
platform  = platformio/espressif32@6.5.0
board     = guition4848s040
framework = arduino
board_build.flash_size   = 16MB
board_build.partitions   = huge_app.csv
board_build.arduino.memory_type = qio_opi
upload_speed    = 921600
monitor_speed   = 115200

build_flags =
    -DWY_BOARD_GUITION4848S040
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; LVGL config
    -DLV_CONF_INCLUDE_SIMPLE
    ; WEB: bake WiFi creds at build time (override via captive portal on first boot)
    ; -DWY_SETTINGS_BAKED_SSID=\"YourSSID\"
    ; -DWY_SETTINGS_BAKED_PASS=\"YourPassword\"

lib_deps =
    moononournation/GFX Library for Arduino@^1.2.9
    ; LVGL
    lvgl/lvgl@^8.4.0
    ; WebSocket client (Pi agent event stream)
    links-a2/WebSockets@^2.4.1
    ; JSON parsing
    bblanchon/ArduinoJson@^7.0.0
    ; wyltek-embedded-builder (WEB) — local symlink/copy
    ; Add as git submodule or copy src/ into lib/wyltek-embedded-builder/src/

lib_extra_dirs =
    lib
