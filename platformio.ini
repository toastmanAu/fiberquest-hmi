; FiberQuest HMI — Guition ESP32-S3-4848S040
; Uses wyltek-embedded-builder (WEB) + pioarduino platform (Arduino ESP32 3.x)

[platformio]
boards_dir = boards

[env:fiberquest-hmi]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board     = guition4848s040
framework = arduino
board_build.flash_size   = 16MB
board_build.partitions   = huge_app.csv
board_build.arduino.memory_type = qio_opi
upload_speed    = 921600
monitor_speed   = 115200

build_flags =
    -DWY_BOARD_GUITION4848S040
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DLV_CONF_INCLUDE_SIMPLE
    -Isrc

lib_deps =
    moononournation/GFX Library for Arduino
    lvgl/lvgl@^8.4.0
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.0.0
    kmackay/micro-ecc@^1.0.0

lib_extra_dirs =
    lib
